<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" width="120" height="160">
  <defs>
    <radialGradient id="thrusterL" cx="50%" cy="0%" r="100%">
      <stop offset="0%"   stop-color="#ff8800" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#ff4400" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="thrusterR" cx="50%" cy="0%" r="100%">
      <stop offset="0%"   stop-color="#ff8800" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#ff4400" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Engine exhaust — flames shoot DOWN from below the hull -->
  <ellipse cx="43" cy="148" rx="9"  ry="16" fill="url(#thrusterL)" filter="url(#bloom)"/>
  <ellipse cx="77" cy="148" rx="9"  ry="16" fill="url(#thrusterR)" filter="url(#bloom)"/>
  <ellipse cx="43" cy="140" rx="4"  ry="6"  fill="#ffe066" opacity="0.9"/>
  <ellipse cx="77" cy="140" rx="4"  ry="6"  fill="#ffe066" opacity="0.9"/>

  <!-- Pure black silhouette — sleek fighter shape -->
  <path d="
    M 60 4
    L 68 40
    L 92 72
    L 88 100
    L 80 108
    L 80 130
    L 68 134
    L 60 130
    L 52 134
    L 40 130
    L 40 108
    L 32 100
    L 28 72
    L 52 40
    Z
  " fill="#000000"/>

  <!-- Intake scoops — thin slivers of light on wing edges only -->
  <line x1="52" y1="40" x2="28" y2="72"
        stroke="#ff6600" stroke-width="1.2" opacity="0.5" filter="url(#bloom)"/>
  <line x1="68" y1="40" x2="92" y2="72"
        stroke="#ff6600" stroke-width="1.2" opacity="0.5" filter="url(#bloom)"/>
</svg>
