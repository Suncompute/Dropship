<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DROPSHIP</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas {
      position: absolute;
      top: 50%; left: 50%;
      /* scaled to viewport by JS — works on any res incl. 4K */
      image-rendering: auto;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const cv = document.getElementById('c');
const cx = cv.getContext('2d');

/* ── Resolution ────────────────────────────────────────────────────────────
   Internal: 1920×1080.  DPR-scaled canvas → crisp on 4K / Retina.
   CSS transform scales it to fill the viewport at the right aspect ratio.  */
const W = 1920, H = 1080;
const DPR = Math.min(window.devicePixelRatio || 1, 2);
cv.width  = W * DPR;
cv.height = H * DPR;
cx.scale(DPR, DPR);
cv.style.width  = W + 'px';
cv.style.height = H + 'px';

function applyScale() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  cv.style.transform = `translate(-50%,-50%) scale(${s})`;
}
window.addEventListener('resize', applyScale);
applyScale();

/* ── Palette  ──────────────────────────────────────────────────────────────
   Tron: pure black void, white-light objects.
   Violet is used only as a danger / accent signal.               */
const WHITE = '#ffffff';
const G90   = '#e8e8f2';   // near-white
const G60   = '#888896';   // mid-light gray
const G30   = '#3a3a4a';   // mid-dark gray
const G10   = '#0a0a10';   // near-black  (object interior fill)
const VIO   = '#7c3aed';   // violet — accent ONLY
const VGLOW = '#a78bfa';   // light violet highlight

/* ── Input ─────────────────────────────────────────────────────────────────*/
const K = {};
addEventListener('keydown', e => {
  K[e.code] = true;
  if (/^(Arrow|Space)/.test(e.code)) e.preventDefault();
  if (e.code === 'Space' && gs !== 'play') startGame();
});
addEventListener('keyup', e => { K[e.code] = false; });

/* ── Game state ─────────────────────────────────────────────────────────── */
let gs = 'title';          // 'title' | 'play' | 'win' | 'lose'
let score, lives, t, lshot, shake;
let ship, planet, buls, ebuls, parts, trail;

/* ── Stars (generated once) ────────────────────────────────────────────── */
const STARS = Array.from({ length: 140 }, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.1 + 0.2,
  a: Math.random() * 0.45 + 0.08,
  f: Math.random() * 0.012 + 0.003,
  p: Math.random() * Math.PI * 2,
}));

/* ── Init / restart ────────────────────────────────────────────────────── */
function startGame() {
  gs = 'play'; score = 0; lives = 3; t = 0; lshot = 0; shake = 0;
  ship   = { x: W / 2, y: H - 170, inv: 0, ft: 0 };
  planet = { x: W / 2, y: 260, mt: 0, ra: 0, hp: 100, lshot: 0, flash: 0 };
  buls = []; ebuls = []; parts = []; trail = [];
}

/* ── Ship path  (100 × 128 internal coord-space, center at 50,62) ───────── */
function shipPath() {
  cx.beginPath();
  cx.moveTo(50, 0);
  cx.bezierCurveTo(50, 0, 58, 30, 62, 55);
  cx.lineTo(90, 75); cx.lineTo(80, 85); cx.lineTo(65, 78);
  cx.lineTo(63, 105); cx.lineTo(57, 110); cx.lineTo(50, 108);
  cx.lineTo(43, 110); cx.lineTo(37, 105); cx.lineTo(35, 78);
  cx.lineTo(20, 85); cx.lineTo(10, 75); cx.lineTo(38, 55);
  cx.bezierCurveTo(42, 30, 50, 0, 50, 0);
  cx.closePath();
}

/* ══════════════════════════  DRAW  ════════════════════════════════════════ */

/* Background: pure black + very faint grid (Tron world) ─────────────────── */
function drawBG() {
  cx.fillStyle = '#000000';
  cx.fillRect(0, 0, W, H);

  cx.strokeStyle = WHITE;
  cx.lineWidth   = 0.5;
  cx.globalAlpha = 0.022;
  for (let x = 0; x <= W; x += 80) {
    cx.beginPath(); cx.moveTo(x, 0); cx.lineTo(x, H); cx.stroke();
  }
  for (let y = 0; y <= H; y += 80) {
    cx.beginPath(); cx.moveTo(0, y); cx.lineTo(W, y); cx.stroke();
  }
  cx.globalAlpha = 1;
}

/* Stars ─────────────────────────────────────────────────────────────────── */
function drawStars() {
  for (const s of STARS) {
    cx.globalAlpha = Math.max(0, s.a + Math.sin(t * s.f * 60 + s.p) * 0.08);
    cx.fillStyle = WHITE;
    cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, Math.PI * 2); cx.fill();
  }
  cx.globalAlpha = 1;
}

/* Ship motion trail ─────────────────────────────────────────────────────── */
function drawTrail() {
  for (let i = 0; i < trail.length; i++) {
    const a = (1 - i / trail.length) * 0.1;
    cx.globalAlpha = a;
    cx.fillStyle = WHITE;
    cx.beginPath(); cx.arc(trail[i].x, trail[i].y, 2.5, 0, Math.PI * 2); cx.fill();
  }
  cx.globalAlpha = 1;
}

/* Ship ──────────────────────────────────────────────────────────────────── */
function drawShip() {
  const { x, y, inv, ft } = ship;
  if (inv > 0 && Math.floor(inv * 12) % 2 === 0) return; // invincibility blink

  cx.save();
  cx.translate(x, y);
  const sc = 0.82;
  cx.scale(sc, sc);
  cx.translate(-50, -62);

  /* engine light jets */
  const fw = 0.82 + Math.sin(ft * 14) * 0.18;
  for (const ex of [38, 62]) {
    cx.save();
    cx.translate(ex, 132); cx.scale(1, fw);
    /* outer glow */
    cx.shadowBlur = 16; cx.shadowColor = WHITE;
    cx.fillStyle = G90; cx.globalAlpha = 0.45;
    cx.beginPath(); cx.ellipse(0, 0, 4, 13, 0, 0, Math.PI * 2); cx.fill();
    /* inner core */
    cx.fillStyle = WHITE; cx.globalAlpha = 0.85; cx.shadowBlur = 5;
    cx.beginPath(); cx.ellipse(0, -3, 1.8, 6, 0, 0, Math.PI * 2); cx.fill();
    cx.restore();
  }

  /* body: near-black fill (dark form in the void) */
  cx.shadowBlur = 0;
  cx.fillStyle  = G10;
  shipPath(); cx.fill();

  /* body: glowing white edge — two passes for intensity */
  cx.shadowBlur = 14; cx.shadowColor = WHITE;
  cx.strokeStyle = G60; cx.lineWidth = 2.5;
  shipPath(); cx.stroke();

  cx.shadowBlur = 5;
  cx.strokeStyle = WHITE; cx.lineWidth = 1;
  shipPath(); cx.stroke();
  cx.shadowBlur = 0;

  /* engine housings */
  cx.strokeStyle = G60; cx.lineWidth = 1.2;
  cx.fillStyle   = G10;
  for (const ex of [33, 57]) {
    cx.beginPath(); cx.roundRect(ex, 108, 10, 18, 3);
    cx.fill(); cx.stroke();
  }
  cx.restore();
}

/* Planet ────────────────────────────────────────────────────────────────── */
const PR = 130; // planet radius

function drawPlanet() {
  const { x, y, ra, hp, flash } = planet;
  cx.save(); cx.translate(x, y);

  /* body */
  cx.fillStyle  = '#030306';
  cx.shadowBlur = 24; cx.shadowColor = 'rgba(255,255,255,0.05)';
  cx.beginPath(); cx.arc(0, 0, PR, 0, Math.PI * 2); cx.fill();
  cx.shadowBlur = 0;

  /* body edge — thin bright crescent */
  const edgeAlpha = flash > 0.3 ? 1 : 0.35;
  cx.strokeStyle  = flash > 0.3 ? WHITE : G30;
  cx.lineWidth    = 1.5;
  cx.shadowBlur   = flash > 0.3 ? 20 : 4;
  cx.shadowColor  = WHITE;
  cx.globalAlpha  = edgeAlpha;
  cx.beginPath(); cx.arc(0, 0, PR, 0, Math.PI * 2); cx.stroke();
  cx.globalAlpha  = 1; cx.shadowBlur = 0;

  /* surface detail ring */
  cx.strokeStyle = G30; cx.lineWidth = 0.6; cx.globalAlpha = 0.2;
  cx.beginPath(); cx.arc(0, 0, PR * 0.72, 0, Math.PI * 2); cx.stroke();
  cx.globalAlpha = 1;

  /* orbital ring ── layered glow for Tron crispness */
  const shieldOn = hp > 50;
  cx.save(); cx.rotate(ra);
  const rx = PR * 1.32, ry = PR * 0.33;

  if (shieldOn) {
    const sf = (hp - 50) / 50; // 1.0 → 0.0 as shield depletes
    /* wide soft bloom */
    cx.strokeStyle = `rgba(255,255,255,${0.07 + sf * 0.08})`;
    cx.lineWidth   = 18;
    cx.beginPath(); cx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); cx.stroke();
    /* mid glow */
    cx.strokeStyle = `rgba(255,255,255,${0.18 + sf * 0.22})`;
    cx.lineWidth   = 6;
    cx.beginPath(); cx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); cx.stroke();
    /* hot core line */
    cx.strokeStyle  = WHITE; cx.lineWidth = 1.5;
    cx.shadowBlur   = 8; cx.shadowColor = WHITE;
    cx.globalAlpha  = 0.5 + sf * 0.5;
    cx.beginPath(); cx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); cx.stroke();
    cx.shadowBlur = 0;
  } else {
    /* broken ring: ghost / flicker */
    const fa = Math.max(0, 0.1 + 0.07 * Math.sin(t * 9.3));
    cx.strokeStyle = G30; cx.lineWidth = 1;
    cx.globalAlpha = fa; cx.setLineDash([14, 22]);
    cx.beginPath(); cx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2); cx.stroke();
    cx.setLineDash([]);
  }
  cx.restore(); cx.globalAlpha = 1;

  /* eye threat-glow  ── the ONE violet accent ─────────────────────────── */
  const eg = shieldOn ? 0.07 : 0.18 + (1 - hp / 100) * 0.55;
  cx.shadowBlur = 28; cx.shadowColor = VIO; cx.fillStyle = VIO;
  cx.globalAlpha = eg;
  cx.beginPath(); cx.ellipse(0, 0, 48, 22, 0, 0, Math.PI * 2); cx.fill();
  cx.globalAlpha = 1; cx.shadowBlur = 0;

  /* eye white (gray in grayscale world) */
  cx.fillStyle = G60;
  cx.beginPath(); cx.ellipse(0, 0, 28, 13, 0, 0, Math.PI * 2); cx.fill();

  /* pupil — tracks player */
  const pAng = Math.atan2(ship.y - y, ship.x - x);
  const px   = Math.cos(pAng) * 9, py = Math.sin(pAng) * 9;
  cx.fillStyle = '#010103';
  cx.beginPath(); cx.arc(px, py, 10, 0, Math.PI * 2); cx.fill();
  /* glint */
  cx.fillStyle = WHITE; cx.globalAlpha = 0.5;
  cx.beginPath(); cx.arc(px + 3.5, py - 2.5, 2.5, 0, Math.PI * 2); cx.fill();
  cx.globalAlpha = 1;

  /* targeting reticle */
  drawReticle();

  cx.restore();
}

/* Targeting reticle (drawn relative to planet center, already translated) ── */
function drawReticle() {
  const bs = PR + 38, bl = 26;

  /* slow-rotating dashed outer ring */
  cx.save(); cx.rotate(t * 0.18);
  cx.strokeStyle = WHITE; cx.lineWidth = 0.8; cx.globalAlpha = 0.07;
  cx.setLineDash([32, 24]);
  cx.beginPath(); cx.arc(0, 0, bs + 22, 0, Math.PI * 2); cx.stroke();
  cx.setLineDash([]); cx.restore();

  /* 4 corner L-brackets (axis-aligned, fixed) */
  cx.strokeStyle = WHITE; cx.lineWidth = 1.8; cx.globalAlpha = 0.28;
  cx.shadowBlur  = 5; cx.shadowColor = WHITE;
  for (const [sx, sy] of [[-1,-1],[1,-1],[-1,1],[1,1]]) {
    cx.beginPath();
    cx.moveTo(sx * bs, sy * (bs - bl));   // vertical arm
    cx.lineTo(sx * bs, sy * bs);           // corner
    cx.lineTo(sx * (bs - bl), sy * bs);   // horizontal arm
    cx.stroke();
  }
  cx.shadowBlur = 0; cx.globalAlpha = 1;
}

/* Particles ─────────────────────────────────────────────────────────────── */
function drawParticles() {
  for (const p of parts) {
    const a = p.life / p.ml;
    cx.globalAlpha = a;
    cx.fillStyle   = p.c;
    cx.shadowBlur  = 6; cx.shadowColor = p.c;
    cx.beginPath(); cx.arc(p.x, p.y, p.r * Math.sqrt(a), 0, Math.PI * 2); cx.fill();
  }
  cx.globalAlpha = 1; cx.shadowBlur = 0;
}

/* HUD ───────────────────────────────────────────────────────────────────── */
function drawHUD() {
  /* lives — mini ship outlines (Tron: outline only, no fill) */
  for (let i = 0; i < lives; i++) {
    cx.save();
    cx.translate(28 + i * 50, 34);
    cx.scale(0.28, 0.28); cx.translate(-50, -62);
    cx.shadowBlur  = 6; cx.shadowColor = WHITE;
    cx.strokeStyle = WHITE; cx.lineWidth = 1.8;
    shipPath(); cx.stroke();
    cx.restore();
  }

  /* score */
  cx.font         = '700 20px "Courier New", monospace';
  cx.textAlign    = 'right';
  cx.fillStyle    = G60;
  cx.shadowBlur   = 0;
  cx.fillText(`SCORE  ${String(score).padStart(6, '0')}`, W - 26, 34);
  cx.textAlign    = 'left';

  /* planet HP bar — thin horizontal line, centered top */
  const bw = 320, bh = 2, bx = (W - bw) / 2, by = 18;

  /* track */
  cx.fillStyle   = G30; cx.globalAlpha = 0.35;
  cx.fillRect(bx, by, bw, bh);
  cx.globalAlpha = 1;

  /* fill — goes violet when critical (the second accent use) */
  const fillFrac = planet.hp / 100;
  const barCol   = planet.hp > 30 ? WHITE : VGLOW;
  cx.fillStyle   = barCol;
  cx.shadowBlur  = barCol === WHITE ? 4 : 12;
  cx.shadowColor = barCol;
  cx.fillRect(bx, by, fillFrac * bw, bh);
  cx.shadowBlur  = 0;

  /* phase tick marks */
  cx.fillStyle = '#000';
  for (const pct of [0.6, 0.3]) {
    cx.fillRect(bx + pct * bw - 0.75, by - 2, 1.5, bh + 4);
  }

  /* label */
  cx.font      = '11px "Courier New", monospace';
  cx.textAlign = 'center';
  cx.fillStyle = G30;
  cx.fillText('HOSTILE  PLANET', W / 2, by + bh + 14);
  cx.textAlign = 'left';
}

/* HUD frame — corner brackets ───────────────────────────────────────────── */
function drawCorners() {
  const m = 20, s = 34;
  cx.strokeStyle = G30; cx.lineWidth = 1.2; cx.globalAlpha = 0.38;
  for (const [ox, oy, sx, sy] of [[m,m,1,1],[W-m,m,-1,1],[m,H-m,1,-1],[W-m,H-m,-1,-1]]) {
    cx.beginPath();
    cx.moveTo(ox + sx * s, oy); cx.lineTo(ox, oy); cx.lineTo(ox, oy + sy * s);
    cx.stroke();
  }
  cx.globalAlpha = 1;
}

/* Full-screen overlay (title / win / lose) ──────────────────────────────── */
function drawOverlay(title, sub1, sub2 = '') {
  cx.fillStyle = 'rgba(0,0,0,0.86)'; cx.fillRect(0, 0, W, H);
  cx.textAlign = 'center';

  /* title */
  cx.font          = '700 96px "Courier New", monospace';
  cx.letterSpacing = '16px';
  cx.fillStyle     = WHITE;
  cx.shadowBlur    = 22; cx.shadowColor = WHITE;
  cx.fillText(title, W / 2, H / 2 - 50);
  cx.letterSpacing = '0px';

  /* separator line */
  cx.shadowBlur  = 4;
  cx.strokeStyle = G30; cx.lineWidth = 1; cx.globalAlpha = 0.5;
  cx.beginPath(); cx.moveTo(W/2 - 200, H/2 - 12); cx.lineTo(W/2 + 200, H/2 - 12); cx.stroke();
  cx.globalAlpha = 1;

  cx.font      = '20px "Courier New", monospace';
  cx.fillStyle = G60; cx.shadowBlur = 6;
  cx.fillText(sub1, W / 2, H / 2 + 24);

  if (sub2) {
    cx.font = '16px "Courier New", monospace';
    cx.fillStyle = G30; cx.shadowBlur = 0;
    cx.fillText(sub2, W / 2, H / 2 + 54);
  }

  /* blinking prompt */
  if (Math.floor(t * 2) % 2 === 0) {
    cx.font = '13px "Courier New", monospace';
    cx.fillStyle = G30; cx.shadowBlur = 0;
    cx.fillText('PRESS  SPACE', W / 2, H / 2 + 96);
  }

  cx.shadowBlur = 0; cx.textAlign = 'left';
}

/* ══════════════════════════  HELPERS  ════════════════════════════════════ */
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function spark(x, y, color, n = 10) {
  for (let i = 0; i < n; i++) {
    parts.push({
      x, y,
      vx: (Math.random() - 0.5) * 520,
      vy: (Math.random() - 0.5) * 520,
      life: 0.35 + Math.random() * 0.35,
      ml: 0.7,
      r:  Math.random() * 4 + 1,
      c:  color,
    });
  }
}

function ringBurst(px, py) {
  /* ring shatters when shield breaks — arc fragments fly outward */
  const rx = PR * 1.32, ry = PR * 0.33;
  for (let i = 0; i < 32; i++) {
    const a = (i / 32) * Math.PI * 2;
    parts.push({
      x: px + Math.cos(a) * rx,
      y: py + Math.sin(a) * ry,
      vx: Math.cos(a) * 140 + (Math.random() - 0.5) * 90,
      vy: Math.sin(a) * 70  + (Math.random() - 0.5) * 70,
      life: 0.85, ml: 0.85, r: 3, c: WHITE,
    });
  }
}

function victoryBurst() {
  for (let i = 0; i < 80; i++) {
    const a   = Math.random() * Math.PI * 2;
    const spd = Math.random() * 520 + 80;
    parts.push({
      x: planet.x + (Math.random() - 0.5) * 70,
      y: planet.y + (Math.random() - 0.5) * 70,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      life: Math.random() * 1.4 + 0.5, ml: 1.9,
      r: Math.random() * 7 + 2,
      c: [WHITE, G60, VGLOW][Math.floor(Math.random() * 3)],
    });
  }
}

/* ══════════════════════════  UPDATE  ════════════════════════════════════ */
function update(dt) {
  t     += dt;
  shake  = Math.max(0, shake - dt * 85);

  /* ship movement */
  let dx = 0, dy = 0;
  if (K.ArrowLeft  || K.KeyA) dx -= 1;
  if (K.ArrowRight || K.KeyD) dx += 1;
  if (K.ArrowUp    || K.KeyW) dy -= 1;
  if (K.ArrowDown  || K.KeyS) dy += 1;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }

  const prevX = ship.x, prevY = ship.y;
  ship.x   = clamp(ship.x + dx * 580 * dt, 40, W - 40);
  ship.y   = clamp(ship.y + dy * 580 * dt, 130, H - 55);
  ship.inv = Math.max(0, ship.inv - dt);
  ship.ft += dt;

  /* motion trail */
  if (Math.hypot(ship.x - prevX, ship.y - prevY) > 1.5) {
    trail.unshift({ x: ship.x, y: ship.y });
    if (trail.length > 20) trail.pop();
  }

  /* fire */
  if ((K.Space || K.KeyZ) && t - lshot > 0.14) {
    lshot = t;
    buls.push({ x: ship.x, y: ship.y - 44 });
  }

  /* planet movement */
  const pf  = planet.hp / 100;
  const amp = 260 + (1 - pf) * 180;
  const spd = 0.48 + (1 - pf) * 2.0;
  planet.mt += dt * spd;

  if (planet.hp > 50) {
    planet.x = W / 2 + Math.sin(planet.mt) * amp;
    planet.y = 270   + Math.sin(planet.mt * 0.55) * 55;
  } else {
    /* figure-8 — more threatening */
    planet.x = W / 2 + Math.sin(planet.mt) * amp;
    planet.y = 275   + Math.sin(planet.mt * 2.1) * 130;
  }
  planet.x = clamp(planet.x, 180, W - 180);
  planet.y = clamp(planet.y, 160, 500);

  planet.ra    += dt * (0.9 + (1 - pf) * 0.95);
  planet.flash  = Math.max(0, planet.flash - dt * 9);

  /* planet fires */
  const fr  = planet.hp > 60 ? 2.0 : planet.hp > 30 ? 1.2 : 0.6;
  if (t - planet.lshot > fr) {
    planet.lshot = t;
    const ang  = Math.atan2(ship.y - planet.y, ship.x - planet.x);
    const bspd = 340 + (1 - pf) * 220;
    const spread = planet.hp > 60
      ? [0]
      : planet.hp > 30
        ? [-0.15, 0, 0.15]
        : [-0.3, -0.12, 0, 0.12, 0.3];
    for (const da of spread)
      ebuls.push({
        x: planet.x, y: planet.y,
        vx: Math.cos(ang + da) * bspd,
        vy: Math.sin(ang + da) * bspd,
      });
  }

  /* player bullets */
  const prevHp = planet.hp;
  for (let i = buls.length - 1; i >= 0; i--) {
    const b = buls[i];
    b.y -= 1250 * dt;
    if (b.y < -24) { buls.splice(i, 1); continue; }

    const dist = Math.hypot(b.x - planet.x, b.y - planet.y);
    const hitR = planet.hp > 50 ? PR + 54 : PR;  // include ring zone
    if (dist < hitR) {
      buls.splice(i, 1);
      const dmg = planet.hp > 50 ? 3.5 : 6;
      planet.hp    = Math.max(0, planet.hp - dmg);
      planet.flash = 1;
      score       += planet.hp > 50 ? 10 : 22;
      spark(b.x, b.y, planet.hp <= 50 ? VGLOW : WHITE, 8);

      if (planet.hp <= 0) { gs = 'win'; score += 1000; victoryBurst(); return; }
    }
  }

  /* shield-break event */
  if (prevHp > 50 && planet.hp <= 50) {
    ringBurst(planet.x, planet.y);
    shake = 8;
  }

  /* enemy bullets */
  for (let i = ebuls.length - 1; i >= 0; i--) {
    const b = ebuls[i];
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.x < -32 || b.x > W + 32 || b.y < -32 || b.y > H + 32) {
      ebuls.splice(i, 1); continue;
    }
    if (ship.inv <= 0 && Math.hypot(b.x - ship.x, b.y - ship.y + 10) < 30) {
      ebuls.splice(i, 1);
      lives--;
      ship.inv = 2.6; shake = 12;
      spark(ship.x, ship.y, WHITE, 18);
      if (lives <= 0) { gs = 'lose'; return; }
    }
  }

  /* particles */
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.87; p.vy *= 0.87;
    p.life -= dt;
    if (p.life <= 0) parts.splice(i, 1);
  }
}

/* ══════════════════════════  MAIN LOOP  ══════════════════════════════════ */
let last = 0;

function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  if (gs === 'play') update(dt);
  else t += dt;   // keep time ticking for blink / idle animations

  cx.clearRect(0, 0, W, H);

  cx.save();
  if (shake > 0)
    cx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

  drawBG();
  drawStars();

  if (gs !== 'title') {
    drawTrail();
    drawParticles();

    /* player bullets — white light rods */
    cx.fillStyle  = WHITE; cx.shadowBlur = 7; cx.shadowColor = WHITE;
    for (const b of buls) {
      cx.beginPath(); cx.ellipse(b.x, b.y, 3, 12, 0, 0, Math.PI * 2); cx.fill();
    }

    /* enemy bullets — mid-gray spheres */
    cx.fillStyle  = G60; cx.shadowBlur = 6; cx.shadowColor = G60;
    for (const b of ebuls) {
      cx.beginPath(); cx.arc(b.x, b.y, 8, 0, Math.PI * 2); cx.fill();
    }
    cx.shadowBlur = 0;

    if (gs === 'play' || gs === 'lose') drawPlanet();
    drawShip();
    drawHUD();
  }

  drawCorners();
  cx.restore();

  /* overlays */
  if (gs === 'title')
    drawOverlay('DROPSHIP',
      'HUNT THE HOSTILE PLANET BEFORE IT AWAKENS',
      'WASD  /  ARROWS  —  MOVE          SPACE  —  FIRE');
  else if (gs === 'win')
    drawOverlay('MISSION  COMPLETE',
      `FINAL  SCORE   ${String(score).padStart(6, '0')}`,
      'TARGET  ELIMINATED');
  else if (gs === 'lose')
    drawOverlay('SIGNAL  LOST',
      `FINAL  SCORE   ${String(score).padStart(6, '0')}`,
      'SHIP  DESTROYED');

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
