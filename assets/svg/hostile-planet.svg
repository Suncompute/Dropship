<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <!-- Shadow layer — 7px versetzt, deep red -->
  <circle cx="117" cy="117" r="72" fill="#cc0033"/>

  <!-- Shield ring shadow -->
  <ellipse cx="117" cy="117" rx="95" ry="24" fill="none"
           stroke="#cc0033" stroke-width="3" stroke-dasharray="14,7"/>

  <!-- Main black planet -->
  <circle cx="110" cy="110" r="72" fill="#000000"/>

  <!-- Shield ring — black -->
  <ellipse cx="110" cy="110" rx="95" ry="24" fill="none"
           stroke="#000000" stroke-width="4" stroke-dasharray="14,7"/>

  <!-- Eye — the planet awakens, tiny red slit -->
  <ellipse cx="110" cy="110" rx="10" ry="4" fill="#cc0033"/>
  <ellipse cx="110" cy="110" rx="10" ry="4"
           fill="none" stroke="#000000" stroke-width="1.5"
           transform="translate(4,4)"/>
</svg>
