  <g filter="url(#starGlow)">
    <g transform="translate(230,90)">
      <circle r="1.8" fill="white" opacity="0.95"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="white" stroke-width="0.4" opacity="0.5"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="white" stroke-width="0.4" opacity="0.5"/>
    </g>
    <g transform="translate(620,155)">
