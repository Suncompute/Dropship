<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Planet body -->
  <circle cx="90" cy="90" r="65" fill="#000000"/>

  <!-- Shield ring — ellipse um den Planeten -->
  <ellipse cx="90" cy="90" rx="85" ry="22"
           fill="none" stroke="#000000" stroke-width="6"/>

  <!-- Eye — planet awakens -->
  <ellipse cx="90" cy="90" rx="14" ry="6" fill="white"/>
  <circle  cx="90" cy="90" r="5"          fill="#000000"/>
</svg>
