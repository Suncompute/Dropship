<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="void" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#0a0015"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="nebula1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3d0066" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3d0066" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#001a4d" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#001a4d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a0033" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a0033" stop-opacity="0"/>
    </radialGradient>
    <filter id="starBloom">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigStarBloom">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- The void -->
  <rect width="800" height="600" fill="url(#void)"/>

  <!-- Nebula clouds — the only color, everything else is black -->
  <ellipse cx="160" cy="180" rx="220" ry="130" fill="url(#nebula1)" opacity="1"/>
  <ellipse cx="650" cy="420" rx="240" ry="140" fill="url(#nebula2)" opacity="1"/>
  <ellipse cx="400" cy="300" rx="350" ry="160" fill="url(#nebula3)" opacity="1"/>
  <ellipse cx="700" cy="100" rx="160" ry="90"  fill="url(#nebula1)" opacity="0.5"/>

  <!-- Stars — white pinpoints of light in the darkness -->
  <g fill="white" filter="url(#starBloom)">
    <circle cx="42"  cy="18"  r="0.7" opacity="0.8"/>
    <circle cx="128" cy="55"  r="0.5" opacity="0.6"/>
    <circle cx="89"  cy="140" r="0.8" opacity="0.9"/>
    <circle cx="215" cy="28"  r="0.5" opacity="0.7"/>
    <circle cx="312" cy="77"  r="0.6" opacity="0.8"/>
    <circle cx="460" cy="10"  r="0.5" opacity="0.6"/>
    <circle cx="592" cy="44"  r="0.7" opacity="0.9"/>
    <circle cx="674" cy="122" r="0.5" opacity="0.7"/>
    <circle cx="725" cy="38"  r="0.6" opacity="0.8"/>
    <circle cx="148" cy="215" r="0.5" opacity="0.6"/>
    <circle cx="270" cy="172" r="0.7" opacity="0.9"/>
    <circle cx="395" cy="195" r="0.5" opacity="0.7"/>
    <circle cx="514" cy="160" r="0.6" opacity="0.8"/>
    <circle cx="638" cy="205" r="0.5" opacity="0.6"/>
    <circle cx="762" cy="188" r="0.7" opacity="0.9"/>
    <circle cx="86"  cy="305" r="0.5" opacity="0.7"/>
    <circle cx="192" cy="350" r="0.6" opacity="0.8"/>
    <circle cx="338" cy="285" r="0.5" opacity="0.6"/>
    <circle cx="482" cy="335" r="0.7" opacity="0.9"/>
    <circle cx="604" cy="305" r="0.5" opacity="0.7"/>
    <circle cx="714" cy="275" r="0.6" opacity="0.8"/>
    <circle cx="52"  cy="425" r="0.5" opacity="0.6"/>
    <circle cx="175" cy="472" r="0.7" opacity="0.9"/>
    <circle cx="292" cy="410" r="0.5" opacity="0.7"/>
    <circle cx="425" cy="455" r="0.6" opacity="0.8"/>
    <circle cx="548" cy="430" r="0.5" opacity="0.6"/>
    <circle cx="670" cy="485" r="0.7" opacity="0.9"/>
    <circle cx="778" cy="415" r="0.5" opacity="0.7"/>
    <circle cx="118" cy="548" r="0.6" opacity="0.8"/>
    <circle cx="248" cy="525" r="0.5" opacity="0.6"/>
    <circle cx="382" cy="565" r="0.7" opacity="0.9"/>
    <circle cx="502" cy="540" r="0.5" opacity="0.7"/>
    <circle cx="642" cy="555" r="0.6" opacity="0.8"/>
    <circle cx="752" cy="530" r="0.5" opacity="0.6"/>
  </g>

  <!-- Bright stars with cross flare -->
  <g filter="url(#bigStarBloom)">
    <g transform="translate(232,95)">
      <circle r="1.5" fill="white" opacity="1"/>
      <line x1="-7" y1="0" x2="7" y2="0" stroke="white" stroke-width="0.3" opacity="0.6"/>
      <line x1="0" y1="-7" x2="0" y2="7" stroke="white" stroke-width="0.3" opacity="0.6"/>
    </g>
    <g transform="translate(618,160)">
      <circle r="1.8" fill="#e0e8ff" opacity="1"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#e0e8ff" stroke-width="0.3" opacity="0.5"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#e0e8ff" stroke-width="0.3" opacity="0.5"/>
    </g>
    <g transform="translate(68,392)">
      <circle r="1.4" fill="white" opacity="1"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="white" stroke-width="0.3" opacity="0.5"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="white" stroke-width="0.3" opacity="0.5"/>
    </g>
    <g transform="translate(743,318)">
      <circle r="1.6" fill="white" opacity="1"/>
      <line x1="-7" y1="0" x2="7" y2="0" stroke="white" stroke-width="0.3" opacity="0.6"/>
      <line x1="0" y1="-7" x2="0" y2="7" stroke="white" stroke-width="0.3" opacity="0.6"/>
    </g>
    <g transform="translate(380,520)">
      <circle r="1.5" fill="#ffe0f0" opacity="1"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#ffe0f0" stroke-width="0.3" opacity="0.5"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#ffe0f0" stroke-width="0.3" opacity="0.5"/>
    </g>
  </g>
</svg>
