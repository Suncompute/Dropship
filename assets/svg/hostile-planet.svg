<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="planetAura" cx="50%" cy="50%" r="50%">
      <stop offset="55%"  stop-color="#6600cc" stop-opacity="0"/>
      <stop offset="80%"  stop-color="#8800ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#aa00ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crackLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff3300" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBloom">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <clipPath id="planetMask">
      <circle cx="100" cy="100" r="62"/>
    </clipPath>
  </defs>

  <!-- Aura — glowing light from behind -->
  <circle cx="100" cy="100" r="90"
          fill="url(#planetAura)" filter="url(#softBloom)" opacity="0.8"/>

  <!-- Lava cracks — light bleeds through BEFORE the silhouette -->
  <g clip-path="url(#planetMask)" filter="url(#bloom)" opacity="0.85">
    <path d="M85,50 Q92,70 88,90 Q95,110 88,130" stroke="#ff2200" stroke-width="2.5" fill="none"/>
    <path d="M100,45 Q106,68 100,88 Q108,108 100,128" stroke="#ff3300" stroke-width="2" fill="none"/>
    <path d="M70,80 Q85,85 100,80 Q115,76 130,82" stroke="#ff1100" stroke-width="1.8" fill="none"/>
    <path d="M80,118 Q92,108 108,115" stroke="#cc2200" stroke-width="1.5" fill="none"/>
    <circle cx="88" cy="90" r="4" fill="#ff4400"/>
    <circle cx="100" cy="88" r="3" fill="#ff3300"/>
  </g>

  <!-- Pure black silhouette — planet is pure shadow -->
  <circle cx="100" cy="100" r="62" fill="#000000"/>

  <!-- Shield rings — thin glowing arcs floating in front -->
  <ellipse cx="100" cy="100" rx="80" ry="20"
           fill="none" stroke="#9900ff" stroke-width="1.5"
           stroke-dasharray="12,6" opacity="0.7" filter="url(#bloom)"/>
  <ellipse cx="100" cy="100" rx="72" ry="16"
           fill="none" stroke="#7700cc" stroke-width="1"
           stroke-dasharray="8,8" opacity="0.5"/>
</svg>
