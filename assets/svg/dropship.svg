<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <defs>
    <radialGradient id="thruster" cx="50%" cy="100%" r="60%">
      <stop offset="0%"   stop-color="#ff8800" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#ff4400" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Engine glow — leaks from BEHIND the silhouette -->
  <ellipse cx="60" cy="108" rx="22" ry="14"
           fill="url(#thruster)" filter="url(#bloom)" opacity="0.9"/>

  <!-- Pure black silhouette — the ship is shadow itself -->
  <path d="
    M 60 8
    L 80 55
    L 90 80
    L 75 85
    L 72 100
    L 65 95
    L 60 105
    L 55 95
    L 48 100
    L 45 85
    L 30 80
    L 40 55
    Z
  " fill="#000000"/>

  <!-- Engine cut-outs — small slivers where light bleeds through -->
  <ellipse cx="50" cy="98" rx="4" ry="6" fill="#ff6600" opacity="0.7" filter="url(#bloom)"/>
  <ellipse cx="70" cy="98" rx="4" ry="6" fill="#ff6600" opacity="0.7" filter="url(#bloom)"/>
</svg>
