<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <!-- Dark void planet gradient -->
    <radialGradient id="planet-grad" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#1a0a2e"/>
      <stop offset="70%"  stop-color="#0a0618"/>
      <stop offset="100%" stop-color="#060412"/>
    </radialGradient>
    <!-- Planet outer glow -->
    <filter id="planet-aura" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#4c1d95" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="aura"/>
      <feMerge>
        <feMergeNode in="aura"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Shield ring glow -->
    <filter id="ring-glow" x="-8%" y="-60%" width="116%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Eye glow — red threat -->
    <filter id="eye-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Planet body -->
  <circle cx="90" cy="90" r="65" fill="url(#planet-grad)" filter="url(#planet-aura)"/>

  <!-- Subtle surface texture rings -->
  <circle cx="90" cy="90" r="65" fill="none" stroke="#2d1b69" stroke-width="1" opacity="0.35"/>
  <circle cx="90" cy="90" r="50" fill="none" stroke="#1e1248" stroke-width="0.5" opacity="0.25"/>

  <!-- Shield ring — violet glow -->
  <ellipse cx="90" cy="90" rx="85" ry="22"
           fill="none" stroke="#7c3aed" stroke-width="2.5"
           filter="url(#ring-glow)" opacity="0.85"/>

  <!-- Eye halo — red threat aura -->
  <ellipse cx="90" cy="90" rx="20" ry="10"
           fill="#dc2626" opacity="0.2" filter="url(#eye-glow)"/>

  <!-- Eye white -->
  <ellipse cx="90" cy="90" rx="14" ry="6" fill="#fce7e7"/>

  <!-- Pupil -->
  <circle cx="90" cy="90" r="5" fill="#1a0000"/>

  <!-- Eye glint -->
  <circle cx="92.5" cy="88" r="1.5" fill="#ffffff" opacity="0.65"/>
</svg>
