<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 148" width="100" height="148">
  <defs>
    <!-- Violet aura around ship body -->
    <filter id="ship-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5" result="blur"/>
      <feFlood flood-color="#7c3aed" flood-opacity="0.55" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Ice-blue engine flame glow -->
    <filter id="flame-glow" x="-80%" y="-30%" width="260%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Engine flames — behind ship -->
  <ellipse cx="38" cy="132" rx="4.5" ry="10" fill="#38bdf8" opacity="0.75" filter="url(#flame-glow)"/>
  <ellipse cx="62" cy="132" rx="4.5" ry="10" fill="#38bdf8" opacity="0.75" filter="url(#flame-glow)"/>
  <!-- Inner flame core -->
  <ellipse cx="38" cy="128" rx="2"   ry="5"  fill="#e0f2fe" opacity="0.9"/>
  <ellipse cx="62" cy="128" rx="2"   ry="5"  fill="#e0f2fe" opacity="0.9"/>

  <!-- Ship body — white silhouette -->
  <path d="
    M 50 0
    C 50 0, 58 30, 62 55
    L 90 75
    L 80 85
    L 65 78
    L 63 105
    L 57 110
    L 50 108
    L 43 110
    L 37 105
    L 35 78
    L 20 85
    L 10 75
    L 38 55
    C 42 30, 50 0, 50 0
    Z
  " fill="#ffffff" filter="url(#ship-glow)"/>

  <!-- Engine housings -->
  <rect x="33" y="108" width="10" height="18" rx="4" fill="#e2e8f0"/>
  <rect x="57" y="108" width="10" height="18" rx="4" fill="#e2e8f0"/>
</svg>
