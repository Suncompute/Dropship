<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="deepSpace" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#060612"/>
      <stop offset="100%" stop-color="#000005"/>
    </radialGradient>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Deep space background -->
  <rect width="800" height="600" fill="url(#deepSpace)"/>

  <!-- Nebula wisps -->
  <ellipse cx="200" cy="150" rx="180" ry="80" fill="#1a0030" opacity="0.15"/>
  <ellipse cx="600" cy="400" rx="200" ry="100" fill="#001a30" opacity="0.12"/>
  <ellipse cx="400" cy="300" rx="300" ry="120" fill="#0d001a" opacity="0.1"/>

  <!-- Stars — tiny -->
  <g fill="white" filter="url(#starGlow)">
    <circle cx="45" cy="23" r="0.6" opacity="0.9"/>
