    <circle cx="88" cy="310" r="0.5" opacity="0.6"/>
    <circle cx="195" cy="355" r="0.7" opacity="0.9"/>
    <circle cx="340" cy="290" r="0.5" opacity="0.7"/>
    <circle cx="478" cy="340" r="0.6" opacity="0.8"/>
    <circle cx="600" cy="310" r="0.5" opacity="0.6"/>
    <circle cx="712" cy="280" r="0.7" opacity="0.9"/>
